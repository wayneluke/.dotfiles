<VirtualHost *:80>
        DocumentRoot /Volumes/Secondary/Sites/Kodiak/public"
        ServerName kodiak.test
        ErrorLog "/Volumes/Secondary/Sites/Kodiak/logs/httpd_error.log"
        CustomLog "/Volumes/Secondary/Sites/Kodiak/logs/httpd_access.log" common

        <Directory "/Volumes/Secondary/Sites/Kodiak/public">
            Options Indexes FollowSymLinks
            AllowOverride All
            Require all granted
        </Directory>
</VirtualHost>

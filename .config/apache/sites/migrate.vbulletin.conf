<VirtualHost *:80>
        DocumentRoot "/Volumes/Secondary/Sites/vBulletin/migrate"
        ServerName migrate.vbulletin.test
        ErrorLog "/Volumes/Secondary/Sites/vBulletin/migrate/Logs/httpd_error.log"
        CustomLog "/Volumes/Secondary/Sites/vBulletin/migrate/Logs/httpd_access.log" common
        php_flag log_errors on
        php_flag display_errors off
        php_value error_reporting 2147483647
        php_value error_log /Volumes/Secondary/Sites/vBulletin/migrate/Logs/php_error.log

        <Directory "/Volumes/Secondary/Sites/vBulletin/migrate">
	    AllowOverride All
            Require all granted
        </Directory>
</VirtualHost>
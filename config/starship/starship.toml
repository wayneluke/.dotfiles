# Powerline style with Nord color palette

format = """
[¯éÂ](nord0)\
$os\
$username\
[@](bg:nord0 fg:nord4)\
$hostname\
[¯é░](bg:nord1 fg:nord0)\
$directory\
[¯é░](bg:nord2 fg:nord1)\
$git_branch\
$git_status\
$git_metrics\
[¯é░](bg:nord3 fg:nord2)\
$c\
$elixir\
$elm\
$golang\
$python\
$gradle\
$haskell\
$java\
$julia\
$nodejs\
$nim\
$rust\
$scala\
[¯é░](fg:nord3)
$status
"""

scan_timeout = 50
command_timeout = 1000
add_newline = false
palette = 'nord'

[palettes.nord]
nord0 = '#2E3440'
nord1 = '#3B4252'
nord2 = '#434C5E'
nord3 = '#4C566A'
nord4 = '#D8DEE9'
nord11 = '#BF616A'
nord13 = '#EBCB8B'
nord14 = '#A2BE8A'

# username, host and OS
[username]
style_root = 'bg:nord0 fg:nord11'
style_user = 'bg:nord0 fg:nord4'
format = '[$user]($style)'
show_always = true
disabled = false

[hostname]
ssh_only = false
ssh_symbol = ' ¯¼ü'
trim_at = '.'
format = '[$hostname$ssh_symbol]($style)'
style = 'bg:nord0 fg:nord4'
disabled = false

[os]
format = '[ $symbol ]($style)'
style = 'bg:nord0 fg:nord4'
disabled = false
# for symbols look at the end of the file

# directory
[directory]
truncation_length = 3
truncate_to_repo = true
format = '[ $path ]($style)[$read_only]($read_only_style)'
style = 'bg:nord1 fg:nord4'
disabled = false
read_only = ' ¾░î¥ '
read_only_style = 'bg:nord1 fg:nord11'
truncation_symbol = ''

[directory.substitutions]
'Documents' = '¾░êÖ'
'Downloads' = '´ÇÖ '
'Music' = '´Çü '
'Pictures' = '´Ç¥ '
'Projects' = '¯»ş '

# git
[git_branch]
symbol = '´Éİ'
style = 'bg:nord2 fg:nord4'
format = '[ $symbol $branch ]($style)'

[git_status]
style = 'bg:nord2 fg:nord4'
format = '[$all_status$ahead_behind ]($style)'

[git_metrics]
added_style = 'bg:nord2 fg:nord14'
deleted_style = 'bg:nord2 fg:nord11'
format = '[+$added ]($added_style)[-$deleted ]($deleted_style)'
disabled = false

